<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist Old Arrest Warrant — Firebase Edition</title>
<style>
  /* ส่วนตกแต่งหน้าตา (เหมือนเดิมที่คุณชอบ) */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', 'Segoe UI', sans-serif; background: #f4f4f4; color: #222; }
  .app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
  .header { background: #C0392B; color: white; padding: 1.2rem 1.5rem; border-radius: 12px; margin-bottom: 1.25rem; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .suspect-form { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field label { font-size: 12px; color: #666; }
  .form-field input, .form-field textarea { padding: 7px 10px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; }
  .summary-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 1rem; }
  .stat-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 0.75rem 1rem; flex: 1; min-width: 100px; }
  .stat-val { font-size: 24px; font-weight: 600; }
  .section-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .tab-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; }
  .tab-btn.active { background: #C0392B; color: white; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .btn { padding: 8px 16px; font-size: 13px; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; }
  .btn.primary { background: #C0392B; color: white; border-color: #C0392B; }
  .btn.success { background: #27AE60; color: white; border-color: #27AE60; }
  .checklist-section { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; margin-bottom: 0.75rem; overflow: hidden; }
  .section-header { padding: 0.85rem 1rem; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .section-items { padding: 0 1rem 0.75rem; display: none; }
  .section-items.open { display: block; }
  .check-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
  .notes-field { width: 100%; padding: 5px 8px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; display: none; margin-top: 5px; }
  .check-item.show-note .notes-field { display: block; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #27AE60; color: white; padding: 10px 18px; border-radius: 8px; opacity: 0; transition: 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>ระบบเช็คลิสต์หมายจับค้างเก่า (Firebase)</h1>
    <p>บันทึกและดึงข้อมูลจากถังข้อมูลออนไลน์</p>
  </div>

  <div class="suspect-form">
    <h2>ข้อมูลผู้ต้องหา / Suspect Profile</h2>
    <div class="form-grid">
      <div class="form-field"><label>เลขบัตรประชาชน (ใช้ค้นหา/บันทึก)</label><input id="f-id" type="text" placeholder="1-XXXX-XXXXX-XX-X" /></div>
      <div class="form-field"><label>ชื่อ-นามสกุล</label><input id="f-name" type="text" placeholder="ชื่อ นามสกุล" /></div>
      <div class="form-field"><label>เพศ</label><input id="f-gender" type="text" placeholder="ชาย / หญิง" /></div>
      <div class="form-field"><label>อายุ</label><input id="f-age" type="text" placeholder="อายุ" /></div>
      <div class="form-field"><label>เลขหมายจับ</label><input id="f-warrant" type="text" placeholder="หมายเลข" /></div>
      <div class="form-field"><label>ข้อหา</label><input id="f-charge" type="text" placeholder="ข้อหา" /></div>
      <div class="form-field" style="grid-column:1/-1;"><label>ที่อยู่</label><textarea id="f-address" placeholder="ที่อยู่ปัจจุบัน"></textarea></div>
      <div class="form-field"><label>ผู้บันทึก</label><input id="f-officer" type="text" placeholder="ชื่อเจ้าหน้าที่" /></div>
      <div class="form-field"><label>วันที่ตรวจสอบ</label><input id="f-date" type="date" /></div>
    </div>
  </div>

  <div class="summary-bar">
    <div class="stat-card"><div class="stat-label">ตรวจสอบแล้ว</div><div class="stat-val" id="checked-count" style="color:#27AE60;">0</div></div>
    <div class="stat-card"><div class="stat-label">ความคืบหน้า</div><div class="stat-val" id="pct-count">0%</div></div>
  </div>

  <div class="section-tabs" id="section-tabs"></div>

  <div class="actions">
    <button class="btn success" onclick="saveData()">💾 บันทึกลงระบบ Firebase</button>
    <button class="btn primary" onclick="loadFromID()">🔍 ดึงข้อมูลเดิมจากเลขบัตร</button>
    <button class="btn" onclick="clearAll()">🗑 ล้างหน้าจอ</button>
  </div>

  <div id="checklist-container"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // ค่า CONFIG จากรูปที่คุณส่งมา
  const firebaseConfig = {
    apiKey: "AIzaSyDTmoYzCQjf3qN2XgowoBK0wLm5u5qV0AM",
    authDomain: "checklistp8-531ab.firebaseapp.com",
    databaseURL: "https://checklistp8-531ab-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "checklistp8-531ab",
    storageBucket: "checklistp8-531ab.firebasestorage.app",
    messagingSenderId: "675371072034",
    appId: "1:675371072034:web:c286c05cf0c98e6f1b287b",
    measurementId: "G-FWGL3JYT5J"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ข้อมูล Checklist (10 หมวด)
  const SECTIONS = [
    { id:1, color:"#8E44AD", title:"1. ทะเบียนราษฎร์", items:["ผู้ต้องหา — รายละเอียดบัตรประชาชน","คู่สมรส/แฟน","บุตร","พ่อแม่","พี่น้อง","ปู่/ย่า/ตา/ยาย","ลูก/ปิ/ยา/อา","ลูกน้อง","ลูกพี่ลูกน้อง","เพื่อนนิด","เพื่อนร่วมงาน","Link Chart (สรุป)"] },
    { id:2, color:"#E74C3C", title:"2. ประวัติหมายจับ", items:["ตรวจสอบประวัติอาชญากรรม","ฐานะทำงาน","ทะเบียนราษฎร์เดิม","DXC ตรวจสอบ","ผู้รับโอนทรัพย์สิน","สำเนาล้มละลาย","ประวัติสั่งฟ้อง","ประวัติต่อสู้คดี","พฤติกรรม","Time line (สรุป)"] },
    { id:3, color:"#27AE60", title:"3. ใบขับขี่/ยานพาหนะ", items:["ใบอนุญาตขับขี่","ยานพาหนะ GIS","ตรวจสอบประเภทรถ","การทำประกันสุขภาพ","มอเตอร์ไซค์/ตำหนิ","สมาชิกบัตรสินค้า","วันสิ้นสุดสมาชิก","Link Chart (สรุป)"] },
    { id:4, color:"#2980B9", title:"4. การเดินทาง/ด่านสกัด", items:["CCTV ด่านผ่านแดน","ประวัติที่พักโรงแรม","ช่องทางผ่านแดน","ระบบ PIBIC","สตม. หนังสือเดินทาง","ตม.30 (อพาร์ทเม้นท์)","หน่วยงานบริการ","เส้นทางเดินทาง","Link Chart (สรุป)"] },
    { id:5, color:"#F39C12", title:"5. ประกัน/ภาษี", items:["ประกันสังคม","กรมสรรพากร","รพ.สังกัด","กองทุนบำเหน็จ","รายได้/สินทรัพย์","สัญญาเช่าที่ดิน","การประกาศสมัครงาน","โครงสร้างอำนาจ","Link Chart (สรุป)"] },
    { id:6, color:"#E74C3C", title:"6. การสื่อสาร", items:["เลขมือถือ AIS/DTAC/TRUE","วันจดทะเบียน","บริการพิเศษ SMS","IMEI/IMSI","รุ่น/สี มือถือ","รายการโทรเข้า-ออก","พิกัดเสาสัญญาณ","Link Chart (สรุป)"] },
    { id:7, color:"#16A085", title:"7. การเงิน/ธนาคาร", items:["การเปิดบัญชี","สินเชื่อ/กู้ยืม","OTP/SMS Alert","Statement","รายการ ATM","CCTV บริเวณ ATM","Internet Banking","IP Address","Link Chart (สรุป)"] },
    { id:8, color:"#8E44AD", title:"8. บัตรเครดิต/สวัสดิการ", items:["บัตรเดบิต/เครดิต","สถานที่รูดบัตร","TRUE Wallet/Line Pay","เครื่องรูด/CCTV","บัตรสวัสดิการแห่งรัฐ","ร้านค้าที่เข้าร่วม","Link Chart (สรุป)"] },
    { id:9, color:"#2980B9", title:"9. Social Network", items:["FB/IG/Twitter/Line","ค้นหาชื่อจาก Google","เพื่อนใน Social","พิกัดการโพสต์","ภาพ/วิดีโอ ที่อัปโหลด","IP Address Social","เน็ตบ้านที่ใช้","Link Chart (สรุป)"] },
    { id:10, color:"#E67E22", title:"10. DELIVERY/SHOPPING", items:["การสั่งซื้อ DELIVERY","อีเมล์ที่ใช้สั่ง","บัญชี LAZADA/Shopee","ที่อยู่ผู้รับสินค้า","เลข KERRY/Line Man","นำเข้าต่างประเทศ","Link Chart (สรุป)"] }
  ];

  let state = { checked: {}, notes: {} };

  // --- UI Functions ---
  window.init = function() {
    document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    buildTabs();
    buildChecklist();
  };

  window.buildTabs = function() {
    const c = document.getElementById('section-tabs');
    let html = '<button class="tab-btn active" onclick="filterSection(\'all\',this)">ทั้งหมด</button>';
    SECTIONS.forEach(s => html += `<button class="tab-btn" onclick="filterSection(${s.id},this)">${s.id}</button>`);
    c.innerHTML = html;
  };

  window.filterSection = function(id, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.checklist-section').forEach(el => el.style.display = (id === 'all' || el.dataset.id == id) ? 'block' : 'none');
  };

  window.buildChecklist = function() {
    const c = document.getElementById('checklist-container');
    let html = '';
    SECTIONS.forEach(s => {
      const total = s.items.length;
      const done = s.items.filter((_, i) => state.checked[`${s.id}_${i}`]).length;
      const pct = total > 0 ? Math.round(done/total*100) : 0;
      html += `<div class="checklist-section" data-id="${s.id}">
        <div class="section-header" onclick="toggleSection(${s.id})" style="border-left:4px solid ${s.color};">
          <h3>${s.title}</h3>
          <span class="stat-label" id="badge-${s.id}">${done}/${total}</span>
        </div>
        <div class="section-items" id="items-${s.id}">`;
      s.items.forEach((item, i) => {
        const key = `${s.id}_${i}`;
        const isChecked = state.checked[key] || false;
        html += `<div class="check-item" id="ci-${key}">
          <input type="checkbox" id="cb-${key}" ${isChecked?'checked':''} onchange="toggle('${key}',${s.id})" />
          <div style="flex:1;">
            <label for="cb-${key}">${item}</label>
            <textarea class="notes-field" id="note-${key}" onchange="saveNote('${key}',this.value)">${state.notes[key]||''}</textarea>
          </div>
          <button onclick="toggleNote('${key}')">📝</button>
        </div>`;
      });
      html += '</div></div>';
    });
    c.innerHTML = html;
  };

  window.toggleSection = function(id) { document.getElementById(`items-${id}`).classList.toggle('open'); };
  window.toggle = function(key, sid) {
    state.checked[key] = document.getElementById(`cb-${key}`).checked;
    updateStats();
  };
  window.toggleNote = function(key) { document.getElementById(`ci-${key}`).classList.toggle('show-note'); };
  window.saveNote = function(key, val) { state.notes[key] = val; };

  window.updateStats = function() {
    let total = 0, done = 0;
    SECTIONS.forEach(s => s.items.forEach((_, i) => { total++; if(state.checked[`${s.id}_${i}`]) done++; }));
    document.getElementById('checked-count').textContent = done;
    document.getElementById('pct-count').textContent = `${total>0?Math.round(done/total*100):0}%`;
  };

  window.showToast = function(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // --- FIREBASE LOGIC ---
  window.saveData = async function() {
    const idNumber = document.getElementById('f-id').value;
    if (!idNumber) return alert("กรุณาใส่เลขบัตร ปชช. เพื่อเป็นรหัสอ้างอิง");

    const data = {
      profile: {
        id: idNumber,
        name: document.getElementById('f-name').value,
        gender: document.getElementById('f-gender').value,
        age: document.getElementById('f-age').value,
        warrant: document.getElementById('f-warrant').value,
        charge: document.getElementById('f-charge').value,
        address: document.getElementById('f-address').value,
        officer: document.getElementById('f-officer').value,
        date: document.getElementById('f-date').value
      },
      checked: state.checked,
      notes: state.notes
    };

    try {
      showToast('กำลังบันทึก...');
      await setDoc(doc(db, "warrants", idNumber), data);
      showToast('บันทึกสำเร็จ ✓');
    } catch (e) { alert("บันทึกไม่สำเร็จ: " + e.message); }
  };

  window.loadFromID = async function() {
    const idNumber = document.getElementById('f-id').value;
    if (!idNumber) return alert("ใส่เลขบัตร ปชช. เพื่อค้นหา");
    
    showToast('กำลังดึงข้อมูล...');
    const docSnap = await getDoc(doc(db, "warrants", idNumber));
    if (docSnap.exists()) {
      const data = docSnap.data();
      Object.entries(data.profile).forEach(([k,v]) => {
        const el = document.getElementById(`f-${k}`); if (el) el.value = v;
      });
      state.checked = data.checked || {};
      state.notes = data.notes || {};
      buildChecklist();
      updateStats();
      showToast('โหลดข้อมูลสำเร็จ ✓');
    } else {
      alert("ไม่พบข้อมูลเลขบัตรนี้ในระบบ");
    }
  };

  window.clearAll = function() { if(confirm('ล้างหน้าจอ?')) location.reload(); };

  init();
</script>
</body>
</html>
